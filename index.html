<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Is it the World Cup?</title>
  <meta name="description" content="The definitive answer to the question: Is it the World Cup?">
  <meta property="og:title" content="Is it the World Cup?">
  <meta property="og:description" content="The definitive answer.">
  <meta property="og:url" content="https://worldcupyet.com">
  <meta property="og:type" content="website">
  <style>
    /* === Reset & Base === */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a1128;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    /* === Canvas Particle Layer === */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* === NO State === */
    #answer {
      position: relative;
      z-index: 1;
      font-size: clamp(80px, 20vw, 200px);
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
      transition: opacity 0.3s ease;
      user-select: none;
    }

    #countdown {
      position: relative;
      z-index: 1;
      font-size: clamp(14px, 2.5vw, 22px);
      color: #6b7fa3;
      margin-top: 20px;
      letter-spacing: 1px;
      text-align: center;
      padding: 0 20px;
    }

    #copyright {
      position: absolute;
      bottom: 20px;
      z-index: 1;
      font-size: 10px;
      color: #1e3a5f;
      text-decoration: none;
    }

    /* === YES / Celebration State === */
    body.yes {
      background: linear-gradient(135deg, #002868, #bf0a30, #006847, #ce1126, #ffffff, #002868);
      background-size: 400% 400%;
      animation: celebrate 6s ease-in-out infinite;
    }

    @keyframes celebrate {
      0%, 100% { background-position: 0% 50%; }
      25% { background-position: 50% 0%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 100%; }
    }

    body.yes #answer {
      color: #FFD700;
      text-shadow:
        0 2px 4px rgba(0, 0, 0, 0.3),
        0 0 40px rgba(255, 215, 0, 0.4),
        0 0 80px rgba(255, 215, 0, 0.2);
      will-change: transform, opacity, text-shadow;
      animation: yesEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 yesPulse 2s ease-in-out 0.8s infinite;
    }

    @keyframes yesEntrance {
      0% {
        opacity: 0;
        transform: scale(0.3) translateY(40px);
      }
      70% {
        opacity: 1;
        transform: scale(1.15) translateY(0);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes yesPulse {
      0%, 100% {
        text-shadow:
          0 2px 4px rgba(0, 0, 0, 0.3),
          0 0 40px rgba(255, 215, 0, 0.4),
          0 0 80px rgba(255, 215, 0, 0.2);
      }
      50% {
        text-shadow:
          0 2px 4px rgba(0, 0, 0, 0.3),
          0 0 60px rgba(255, 215, 0, 0.6),
          0 0 120px rgba(255, 215, 0, 0.4);
      }
    }

    /* === Trophy above YES === */
    #trophy-icon {
      display: none;
      position: absolute;
      top: -0.6em;
      left: 50%;
      transform: translateX(-50%);
      width: 0.5em;
      height: 0.5em;
      opacity: 0;
      filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.5));
    }

    body.yes #trophy-icon {
      display: block;
      animation: trophyDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
    }

    body.yes #answer::before,
    body.yes #answer::after {
      content: none;
    }

    @keyframes trophyDrop {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-40px);
      }
      70% {
        opacity: 1;
        transform: translateX(-50%) translateY(4px);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* === Subtitle Greeting === */
    #subtitle {
      position: relative;
      z-index: 1;
      font-size: clamp(14px, 3vw, 24px);
      font-family: Georgia, serif;
      font-style: italic;
      color: #8fbc8f;
      opacity: 0;
      margin-top: 8px;
      transition: opacity 0.8s ease;
    }

    #subtitle.visible {
      opacity: 1;
    }

    /* === Interaction Effects === */
    @keyframes shake {
      0%, 100% { transform: scale(1) translate(0, 0); }
      10% { transform: scale(1.1) translate(-4px, 2px); }
      30% { transform: scale(1.1) translate(4px, -2px); }
      50% { transform: scale(1.1) translate(-2px, 4px); }
      70% { transform: scale(1.1) translate(2px, -4px); }
      90% { transform: scale(1.1) translate(-2px, -2px); }
    }

    body.yes #answer.shake {
      animation: shake 0.4s ease-in-out;
    }

    body.yes.inverted {
      background: #FFD700;
    }

    body.yes.inverted #answer {
      color: #0a1128;
      text-shadow: none;
      animation: none;
    }

    #chant-toast {
      position: relative;
      z-index: 1;
      font-size: clamp(16px, 3vw, 28px);
      font-family: Georgia, serif;
      font-style: italic;
      color: #FFD700;
      opacity: 0;
      transition: opacity 0.5s ease;
      margin-top: 10px;
    }

    #chant-toast.visible {
      opacity: 1;
    }

    /* === Boss Mode === */
    #boss-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 2;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    #boss-btn:hover {
      color: rgba(255, 255, 255, 0.7);
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.1);
    }

    body.boss-active #boss-btn {
      z-index: 10001;
      color: #666;
      background: #f3f3f3;
      border-color: #ccc;
    }

    body.boss-active #boss-btn:hover {
      color: #333;
      background: #e8e8e8;
      border-color: #999;
    }

    #boss-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #fff;
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      overflow: auto;
      cursor: default;
    }

    #boss-overlay.active {
      display: block;
    }

    #boss-toolbar {
      background: #217346;
      color: #fff;
      padding: 6px 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #boss-toolbar span {
      opacity: 0.8;
      font-size: 11px;
    }

    #boss-formula {
      background: #f3f3f3;
      border-bottom: 1px solid #d4d4d4;
      padding: 4px 8px;
      font-size: 12px;
      color: #444;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #boss-formula em {
      font-style: normal;
      background: #fff;
      border: 1px solid #ccc;
      padding: 2px 6px;
      min-width: 40px;
      display: inline-block;
    }

    #boss-formula code {
      background: #fff;
      border: 1px solid #ccc;
      padding: 2px 8px;
      flex: 1;
      font-family: Calibri, sans-serif;
    }

    #boss-table {
      width: 100%;
      border-collapse: collapse;
    }

    #boss-table th,
    #boss-table td {
      border: 1px solid #d4d4d4;
      padding: 3px 8px;
      text-align: right;
      white-space: nowrap;
    }

    #boss-table th {
      background: #f3f3f3;
      font-weight: 600;
      position: sticky;
      top: 0;
    }

    #boss-table td:first-child,
    #boss-table th:first-child {
      background: #f9f9f9;
      text-align: left;
      font-weight: 500;
      color: #333;
    }

    #boss-table tr.section-header td {
      background: #e8e8e8;
      font-weight: 700;
      text-align: left;
      color: #1a1a1a;
    }

    #boss-table tr.total td {
      font-weight: 700;
      border-top: 2px solid #888;
    }

    #boss-table td.negative {
      color: #c00;
    }

    #boss-table td.selected {
      outline: 2px solid #217346;
      background: #e8f5e9;
    }

    #boss-sheets {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #f3f3f3;
      border-top: 1px solid #d4d4d4;
      padding: 4px 8px;
      display: flex;
      gap: 2px;
      z-index: 10000;
    }

    #boss-sheets .tab {
      padding: 4px 14px;
      font-size: 11px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: default;
    }

    #boss-sheets .tab.active {
      background: #fff;
      border-bottom: 2px solid #217346;
      font-weight: 600;
    }

    /* === Flag Marquee === */
    #flags {
      display: none;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      overflow: hidden;
      margin-top: 16px;
      -webkit-mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
      mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
    }

    body.yes #flags {
      display: block;
    }

    #flags-track {
      display: flex;
      gap: 12px;
      white-space: nowrap;
      font-size: clamp(20px, 4vw, 32px);
      animation: flagScroll 30s linear infinite;
    }

    @keyframes flagScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @media (prefers-reduced-motion: reduce) {
      #flags-track {
        animation: none;
        flex-wrap: wrap;
        justify-content: center;
      }
    }

    /* === Mobile Polish === */
    body.yes {
      touch-action: manipulation;
    }

    /* === Landscape: prevent clipping on short viewports === */
    @media (orientation: landscape) and (max-height: 500px) {
      #answer {
        font-size: clamp(60px, 15vh, 140px);
      }
    }

    /* === Reduced Motion === */
    @media (prefers-reduced-motion: reduce) {
      body.yes {
        animation: none;
      }

      body.yes #answer {
        animation: none;
        opacity: 1;
        transform: none;
      }

      body.yes #answer::before,
      body.yes #answer::after {
        animation: none;
        opacity: 1;
        transform: translateX(-50%);
      }

      body.yes #answer.shake {
        animation: none;
      }
    }

    /* === Daily Matches Panel === */
    #matches {
      display: none;
      position: relative;
      z-index: 1;
      width: 92%;
      max-width: 640px;
      margin-top: 16px;
      color: #fff;
    }

    body.yes #matches {
      display: block;
    }

    #matches-header {
      font-size: clamp(11px, 1.5vw, 13px);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #FFD700;
      opacity: 0.9;
      text-align: center;
      margin-bottom: 8px;
    }

    #matches-list {
      display: grid;
      gap: 8px;
    }

    .match {
      background: rgba(10, 17, 40, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 10px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }

    .match-final { opacity: 0.7; }
    .match-muted { opacity: 0.85; }

    .match .team {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: clamp(13px, 2vw, 16px);
      font-weight: 600;
      min-width: 0;
    }

    .match .team .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .match .team.home { justify-content: flex-start; }
    .match .team.away { justify-content: flex-end; }
    .match .team.home .name { text-align: left; }
    .match .team.away .name { text-align: right; }

    .match .flag { font-size: clamp(20px, 3vw, 26px); }

    .match .meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 110px;
    }

    .match .label-tag {
      font-size: 9px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #FFD700;
      opacity: 0.85;
    }

    .match .time-primary {
      font-size: clamp(12px, 1.8vw, 14px);
      font-weight: 700;
      color: #FFD700;
      white-space: nowrap;
    }

    .match .time-venue {
      font-size: 10px;
      opacity: 0.9;
      white-space: nowrap;
    }

    .match .venue {
      font-size: 10px;
      opacity: 0.85;
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .match .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 2px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .match .badge.live {
      background: rgba(220, 0, 0, 0.85);
      color: #fff;
    }

    .match .badge.live .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: livePulse 1.2s ease-in-out infinite;
    }

    .match .badge.final {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    #matches-message {
      display: none;
      text-align: center;
      font-size: clamp(13px, 2vw, 15px);
      font-family: Georgia, serif;
      font-style: italic;
      color: #8fbc8f;
      padding: 12px 8px;
    }

    .match-skeleton {
      grid-template-columns: 1fr 1fr 1fr;
      opacity: 0.4;
    }
    .match-skeleton span {
      display: block;
      height: 14px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    @media (max-width: 480px) {
      .match {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }
      .match .team.home { grid-column: 1; grid-row: 1; justify-content: flex-start; }
      .match .team.home .name { text-align: left; }
      .match .team.away { grid-column: 2; grid-row: 1; justify-content: flex-end; }
      .match .team.away .name { text-align: right; }
      .match .meta {
        grid-column: 1 / -1;
        grid-row: 2;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 4px 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .match .badge.live .dot { animation: none; }
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>
  <div id="answer"><svg id="trophy-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="#D4AF37"><path d="M2.5.5A.5.5 0 0 1 3 0h10a.5.5 0 0 1 .5.5q0 .807-.034 1.536a3 3 0 1 1-1.133 5.89c-.79 1.865-1.878 2.777-2.833 3.011v2.173l1.425.356c.194.048.377.135.537.255L13.3 15.1a.5.5 0 0 1-.3.9H3a.5.5 0 0 1-.3-.9l1.838-1.379c.16-.12.343-.207.537-.255L6.5 13.11v-2.173c-.955-.234-2.043-1.146-2.833-3.012a3 3 0 1 1-1.132-5.89A33 33 0 0 1 2.5.5m.099 2.54a2 2 0 0 0 .72 3.935c-.333-1.05-.588-2.346-.72-3.935m10.083 3.935a2 2 0 0 0 .72-3.935c-.133 1.59-.388 2.885-.72 3.935M3.504 1q.01.775.056 1.469c.13 2.028.457 3.546.87 4.667C5.294 9.48 6.484 10 7 10a.5.5 0 0 1 .5.5v2.61a1 1 0 0 1-.757.97l-1.426.356a.5.5 0 0 0-.179.085L4.5 15h7l-.638-.479a.5.5 0 0 0-.18-.085l-1.425-.356a1 1 0 0 1-.757-.97V10.5A.5.5 0 0 1 9 10c.516 0 1.706-.52 2.57-2.864.413-1.12.74-2.64.87-4.667q.045-.694.056-1.469z"/></svg><noscript>NO</noscript></div>
  <div id="subtitle"></div>
  <section id="matches" aria-label="Today's matches">
    <header id="matches-header"></header>
    <div id="matches-list"></div>
    <p id="matches-message"></p>
  </section>
  <div id="flags"><div id="flags-track"></div></div>
  <div id="chant-toast"></div>
  <div id="countdown"></div>

  <div id="boss-overlay"></div>
  <div id="copyright">&copy; 2026 Chris Ballance</div>

  <script>
    /* === World Cup Schedule === */
    const WORLD_CUPS = [
      { start: new Date(2026, 5, 11), end: new Date(2026, 6, 19, 23, 59, 59), label: 'FIFA World Cup 2026', hosts: 'USA, Canada, Mexico' },
      { start: new Date(2030, 5, 1),  end: new Date(2030, 6, 15, 23, 59, 59), label: 'FIFA World Cup 2030', hosts: 'Morocco, Spain, Portugal' },
    ];

    /* === Motion Preference === */
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* === Canvas Setup === */
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    /* === Particle System === */
    const isMobile = window.innerWidth < 768;
    const BALL_COUNT = isMobile ? 15 : 30;
    const CONFETTI_COUNT = isMobile ? 10 : 20;
    const FLAG_COLORS = ['#006847', '#ffffff', '#ce1126', '#002868', '#bf0a30', '#FFD700', '#000000', '#009739', '#ff0000'];
    const particles = [];
    const sparkles = [];

    /* === Soccer Ball Particles === */
    function createBall() {
      return {
        type: 'ball',
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        size: 16 + Math.random() * 24,
        speed: 25 + Math.random() * 45,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 1.2,
        opacity: 0.75 + Math.random() * 0.25,
        wobbleAmp: 20 + Math.random() * 30,
        wobbleFreq: 0.5 + Math.random() * 1.5,
        wobbleOffset: Math.random() * Math.PI * 2,
      };
    }

    function recycleBall(p) {
      p.x = Math.random() * canvas.width;
      p.y = -p.size * 2;
      p.size = 16 + Math.random() * 24;
      p.speed = 25 + Math.random() * 45;
      p.rotation = Math.random() * Math.PI * 2;
      p.rotationSpeed = (Math.random() - 0.5) * 1.2;
      p.opacity = 0.3 + Math.random() * 0.5;
      p.wobbleOffset = Math.random() * Math.PI * 2;

    const ballSpriteSize = 256;
    const ballSprite = document.createElement('canvas');
    ballSprite.width = ballSpriteSize;
    ballSprite.height = ballSpriteSize;
    let ballSpriteReady = false;
    (function renderBallSprite() {
      const sCtx = ballSprite.getContext('2d');
      const scale = ballSpriteSize / 194;
      sCtx.save();
      sCtx.scale(scale, scale);
      // White circle background
      sCtx.beginPath();
      sCtx.arc(97, 97, 95, 0, Math.PI * 2);
      sCtx.fillStyle = '#f0f0f0';
      sCtx.fill();
      sCtx.strokeStyle = '#555';
      sCtx.lineWidth = 2;
      sCtx.stroke();
      // Clip to circle, then draw black path with SVG transform
      sCtx.beginPath();
      sCtx.arc(97, 97, 95, 0, Math.PI * 2);
      sCtx.clip();
      sCtx.translate(-313.077, -69.35);
      sCtx.fillStyle = '#000';
      var ballPath2D = new Path2D(BALL_PATH_D);
      sCtx.fill(ballPath2D);
      sCtx.restore();
      ballSpriteReady = true;
    })();

    function drawBall(p) {
      if (!ballSpriteReady) return;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.opacity;
      const d = p.size * 2;
      ctx.drawImage(ballSprite, -p.size, -p.size, d, d);
      ctx.restore();
    }

    /* === Confetti Particles === */
    function createConfetti() {
      return {
        type: 'confetti',
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        width: 4 + Math.random() * 6,
        height: 8 + Math.random() * 12,
        speed: 20 + Math.random() * 40,
        opacity: 0.4 + Math.random() * 0.5,
        wobbleAmp: 15 + Math.random() * 25,
        wobbleFreq: 0.3 + Math.random() * 1.0,
        wobbleOffset: Math.random() * Math.PI * 2,
        color: FLAG_COLORS[Math.floor(Math.random() * FLAG_COLORS.length)],
        spinSpeed: 1.5 + Math.random() * 2.5,
        spinOffset: Math.random() * Math.PI * 2,
        tumbleSpeed: 2 + Math.random() * 3,
        tumbleOffset: Math.random() * Math.PI * 2,
      };
    }

    function recycleConfetti(p) {
      p.x = Math.random() * canvas.width;
      p.y = -p.height * 2;
      p.width = 4 + Math.random() * 6;
      p.height = 8 + Math.random() * 12;
      p.speed = 20 + Math.random() * 40;
      p.wobbleOffset = Math.random() * Math.PI * 2;
      p.color = FLAG_COLORS[Math.floor(Math.random() * FLAG_COLORS.length)];
    }

    function drawConfetti(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.globalAlpha = p.opacity;

      // 3D flip effect (horizontal scale oscillation)
      const spin = Math.cos(elapsedTime * p.spinSpeed + p.spinOffset);
      const tumble = Math.sin(elapsedTime * p.tumbleSpeed + p.tumbleOffset);
      ctx.scale(Math.abs(spin) * 0.8 + 0.2, 1);
      ctx.rotate(tumble * 0.5);

      ctx.fillStyle = p.color;
      ctx.fillRect(-p.width / 2, -p.height / 2, p.width, p.height);

      ctx.restore();
    }

    /* === Sparkle Burst System === */
    function spawnSparkles(x, y, count) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
        const speed = 80 + Math.random() * 120;
        sparkles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 3 + Math.random() * 4,
          life: 0,
          maxLife: 0.4 + Math.random() * 0.3,
          rotation: Math.random() * Math.PI * 2,
          color: Math.random() > 0.5 ? '#FFD700' : '#ffffff',
        });
      }
    }

    function drawSparkle(s) {
      const progress = s.life / s.maxLife;
      const fade = 1 - progress;
      const scale = 1 - progress * 0.6;

      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rotation + s.life * 3);
      ctx.globalAlpha = fade;
      ctx.fillStyle = s.color;

      // Star/diamond shape
      const sz = s.size * scale;
      ctx.beginPath();
      ctx.moveTo(0, -sz);
      ctx.lineTo(sz * 0.4, -sz * 0.4);
      ctx.lineTo(sz, 0);
      ctx.lineTo(sz * 0.4, sz * 0.4);
      ctx.lineTo(0, sz);
      ctx.lineTo(-sz * 0.4, sz * 0.4);
      ctx.lineTo(-sz, 0);
      ctx.lineTo(-sz * 0.4, -sz * 0.4);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function initParticles() {
      particles.length = 0;
      sparkles.length = 0;
      for (let i = 0; i < BALL_COUNT; i++) {
        const p = createBall();
        p.y = Math.random() * canvas.height;
        particles.push(p);
      }
      for (let i = 0; i < CONFETTI_COUNT; i++) {
        const c = createConfetti();
        c.y = Math.random() * canvas.height;
        particles.push(c);
      }
    }

    /* === World Cup 2026 Teams & Flag Emojis === */
    const WC_TEAMS = [
      'US','MX','CA','FR','ES','DE','PT','NL','BE','HR','AT','CH','NO',
      'AR','BR','CO','UY','EC','PY',
      'JP','KR','AU','IR','SA','QA','JO','UZ',
      'MA','SN','CI','ZA','EG','DZ','TN','GH','CV',
      'PA','HT','CW','NZ',
    ];
    // England & Scotland use subdivision flag sequences
    const ENGLAND_FLAG = '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F';
    const SCOTLAND_FLAG = '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC73\uDB40\uDC63\uDB40\uDC74\uDB40\uDC7F';

    function codeToFlag(code) {
      return String.fromCodePoint(...[...code.toUpperCase()].map(function(c) { return c.charCodeAt(0) + 127397; }));
    }

    function buildFlagStrip() {
      var flags = [ENGLAND_FLAG, SCOTLAND_FLAG];
      for (var i = 0; i < WC_TEAMS.length; i++) {
        flags.push(codeToFlag(WC_TEAMS[i]));
      }
      return flags;
    }

    function populateFlags() {
      var track = document.getElementById('flags-track');
      var flags = buildFlagStrip();
      var html = '';
      // Double for seamless infinite scroll
      for (var r = 0; r < 2; r++) {
        for (var i = 0; i < flags.length; i++) {
          html += '<span>' + flags[i] + '</span>';
        }

    /* === Animation Loop === */
    function tick(timestamp) {
      if (!celebrationActive) return;

      const deltaTime = lastFrameTime ? Math.min((timestamp - lastFrameTime) / 1000, 0.05) : 0;
      lastFrameTime = timestamp;
      elapsedTime += deltaTime;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        p.y += p.speed * deltaTime;
        p.x += Math.sin(elapsedTime * p.wobbleFreq + p.wobbleOffset) * p.wobbleAmp * deltaTime;

        if (p.type === 'ball') {
          p.rotation += p.rotationSpeed * deltaTime;
          if (p.y > canvas.height + p.size * 2) {
            if (p.pourExtra) {
              particles.splice(i, 1);
              i--;
              continue;
            }
            recycleBall(p);
          }
          drawBall(p);
        } else if (p.type === 'confetti') {
          if (p.y > canvas.height + p.height * 2) {
            if (p.pourExtra) {
              particles.splice(i, 1);
              i--;
              continue;
            }
            recycleConfetti(p);
          }
          drawConfetti(p);
        }
      }

      // Update & draw sparkles
      for (let i = sparkles.length - 1; i >= 0; i--) {
        const s = sparkles[i];
        s.life += deltaTime;
        if (s.life >= s.maxLife) {
          sparkles.splice(i, 1);
          continue;
        }
        s.x += s.vx * deltaTime;
        s.y += s.vy * deltaTime;
        s.vy += 120 * deltaTime; // gravity
        drawSparkle(s);
      }

      requestAnimationFrame(tick);
    }

    function formatCountdown(ms, label) {
      const ONE_DAY = 86400000;
      const ONE_HOUR = 3600000;
      const ONE_MINUTE = 60000;
      const ONE_SECOND = 1000;

      const days = Math.floor(ms / ONE_DAY);
      const hours = Math.floor((ms % ONE_DAY) / ONE_HOUR);
      const minutes = Math.floor((ms % ONE_HOUR) / ONE_MINUTE);
      const seconds = Math.floor((ms % ONE_MINUTE) / ONE_SECOND);

      const parts = [];
      if (days > 0) parts.push(days + ' day' + (days !== 1 ? 's' : ''));
      if (hours > 0) parts.push(hours + ' hour' + (hours !== 1 ? 's' : ''));
      if (minutes > 0) parts.push(minutes + ' minute' + (minutes !== 1 ? 's' : ''));
      if (seconds > 0) parts.push(seconds + ' second' + (seconds !== 1 ? 's' : ''));

      return parts.join(', ') + ' until ' + label;
    }

    /* === My Teams (favorite + watchlist) === */
    (function() {
      const STORAGE_KEY = 'worldcupyet.teams';
      const WATCHLIST_MAX = 3;

      let state = { favorite: null, watchlist: [] };
      const subscribers = new Set();

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object') throw new Error('bad shape');
          const fav = typeof parsed.favorite === 'string' ? parsed.favorite : null;
          const watch = Array.isArray(parsed.watchlist)
            ? parsed.watchlist.filter(function(c) { return typeof c === 'string'; }).slice(0, WATCHLIST_MAX)
            : [];
          state = { favorite: fav, watchlist: watch };
        } catch (e) {
          console.warn('MyTeams: resetting corrupted storage:', e);
          try { localStorage.removeItem(STORAGE_KEY); } catch (e2) { /* ignore */ }
          state = { favorite: null, watchlist: [] };
        }
      }

      function persist() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (e) {
          console.error('MyTeams: localStorage write failed:', e);
        }
      }

      function notify() {
        subscribers.forEach(function(fn) {
          try { fn(); } catch (e) { console.error('MyTeams subscriber error:', e); }
        });
      }

      function get() {
        return { favorite: state.favorite, watchlist: state.watchlist.slice() };
      }

      function setFavorite(code) {
        if (code === 'TBD') return;
        if (code && state.watchlist.indexOf(code) >= 0) {
          state.watchlist = state.watchlist.filter(function(c) { return c !== code; });
        }
        state.favorite = code || null;
        persist();
        notify();
      }

      function addWatchlist(code) {
        if (code === 'TBD' || !code) return;
        if (state.favorite === code) return;
        if (state.watchlist.indexOf(code) >= 0) return;
        if (state.watchlist.length >= WATCHLIST_MAX) return;
        state.watchlist = state.watchlist.concat([code]);
        persist();
        notify();
      }

      function removeWatchlist(code) {
        if (state.watchlist.indexOf(code) < 0) return;
        state.watchlist = state.watchlist.filter(function(c) { return c !== code; });
        persist();
        notify();
      }

      function cycle(code) {
        if (code === 'TBD' || !code) return;
        if (state.favorite === code) {
          state.favorite = null;
          persist();
          notify();
          return;
        }
        if (state.watchlist.indexOf(code) >= 0) {
          state.watchlist = state.watchlist.filter(function(c) { return c !== code; });
          state.favorite = code;
          persist();
          notify();
          return;
        }
        if (state.watchlist.length >= WATCHLIST_MAX) {
          state.favorite = code;
          persist();
          notify();
          return 'promoted';
        }
        state.watchlist = state.watchlist.concat([code]);
        persist();
        notify();
      }

      function onChange(fn) {
        subscribers.add(fn);
        return function() { subscribers.delete(fn); };
      }

      load();

      window.MyTeams = {
        get: get,
        setFavorite: setFavorite,
        addWatchlist: addWatchlist,
        removeWatchlist: removeWatchlist,
        cycle: cycle,
        onChange: onChange,
        // openPicker added in Task 3
      };
    })();

        });
        Object.keys(buckets).forEach(function(k) {

            '<span class="time-venue">' + escapeHtml(formatVenueTime(kickoff, match.venue.tz)) + '</span>' +
            '<span class="venue">' + escapeHtml(match.venue.city + ' · ' + match.stage) + '</span>' +
            (status === 'live' ? '<span class="badge live" aria-live="polite"><span class="dot"></span>LIVE</span>' : '') +
            (status === 'final' ? '<span class="badge final">FT</span>' : '') +
          '</div>' +
          '<div class="team away">' +
            '<span class="name">' + escapeHtml(away.name) + '</span>' +
            '<span class="flag">' + flagFor(away.code) + '</span>' +
          '</div>';
        return article;
      }

      function showBracketMessage(stage, el) {
        el.textContent = stage + ' starts tomorrow — matchups set after today’s matches.';
        el.style.display = 'block';
      }

      function renderMatches() {
        const section = document.getElementById('matches');
        const list = document.getElementById('matches-list');
        const message = document.getElementById('matches-message');
        const header = document.getElementById('matches-header');
        if (!section) return;

        if (!cache) {
          // skeleton handled in Task 6
          return;
        }

        list.innerHTML = '';
        message.textContent = '';
        message.style.display = 'none';

        const now = getNow();
        const userTz = getUserTz();
        const buckets = bucketsByDay(cache, userTz);
        const todayKey = bucketKey(now, userTz);
        const todayMatches = buckets[todayKey] || [];

        header.textContent = formatHeader(now, userTz);

        if (todayMatches.length > 0) {
          if (isAllTbd(todayMatches)) {
            showBracketMessage(todayMatches[0].stage, message);
          } else {
            todayMatches.forEach(function(m) {
              list.appendChild(renderCard(m, now));
            });
          }
          return;
        }

        // Rest day: walk forward to next non-empty bucket
        const keys = Object.keys(buckets).sort();
        const nextKey = keys.find(function(k) { return k > todayKey; });
        if (!nextKey) return;
        const nextMatches = buckets[nextKey];
        if (isAllTbd(nextMatches)) {
          showBracketMessage(nextMatches[0].stage, message);
        } else {
          list.appendChild(renderCard(nextMatches[0], now, { muted: true, label: 'Next match' }));
        }
      }

      function showSkeleton() {
        const list = document.getElementById('matches-list');
        const header = document.getElementById('matches-header');
        if (header) header.textContent = '';
        if (list) {
          list.innerHTML =
            '<div class="match match-skeleton">' +
              '<span></span><span></span><span></span>' +
            '</div>';
        }
      }

      function loadMatches() {
        if (cache) return Promise.resolve(cache);
        return fetch(MATCHES_URL)
          .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          })
          .then(function(data) {
            cache = data.matches || [];
            return cache;
          })
          .catch(function(err) {
            console.error('matches.json fetch failed:', err);
            cache = null;
            const section = document.getElementById('matches');
            if (section) section.style.display = 'none';
            return null;
          });
      }

      function start() {
        const section = document.getElementById('matches');
        if (section) section.style.display = '';
        if (renderInterval) clearInterval(renderInterval);
        showSkeleton();
        loadMatches().then(function(matches) {
          if (matches) renderMatches();
        });
        renderInterval = setInterval(function() {
          if (cache) renderMatches();
        }, 60 * 1000);
      }

      function stop() {
        if (renderInterval) {
          clearInterval(renderInterval);
          renderInterval = null;
        }
        const section = document.getElementById('matches');
        if (section) {
          section.style.display = 'none';
          const list = document.getElementById('matches-list');
          const message = document.getElementById('matches-message');
          const header = document.getElementById('matches-header');
          if (list) list.innerHTML = '';
          if (message) { message.textContent = ''; message.style.display = 'none'; }
          if (header) header.textContent = '';
        }
      }

      window.MatchesPanel = { start: start, stop: stop };
    })();

    /* === Init === */
    update();
    setInterval(update, 1000);
  </script>

</body>
</html>
